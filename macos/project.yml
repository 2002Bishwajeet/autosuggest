name: AutoSuggestDesktop
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_NAME: AutoSuggest
    PRODUCT_BUNDLE_IDENTIFIER: dev.autosuggest.desktop
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"
packages:
  AutoSuggestPackage:
    path: ..
targets:
  AutoSuggestDesktop:
    type: application
    platform: macOS
    sources:
      - path: AutoSuggestDesktop
    dependencies:
      - package: AutoSuggestPackage
        product: AutoSuggestApp
    settings:
      base:
        INFOPLIST_FILE: AutoSuggestDesktop/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.autosuggest.desktop
        PRODUCT_NAME: AutoSuggest
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AutoSuggestDesktop/AutoSuggest.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      shared: true
