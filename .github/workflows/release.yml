name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # Swift 6.2 (the package's required tools version) ships with Xcode 26,
      # which needs macOS 15. macos-14 defaults to Swift 5.10 and fails.
      - name: Select Xcode (Swift 6.2+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run tests
        run: |
          swift --version
          swift test

  build-sign-notarize:
    needs: test
    runs-on: macos-15
    # Expose the Sparkle private-key secret as a job-level env var so steps can
    # gate on it in `if:` conditions — the `secrets` context is NOT permitted in
    # `if:` expressions (only env/github/etc.), which fails the whole workflow.
    env:
      SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode (Swift 6.2+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Preflight secrets
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
          TEAM: ${{ secrets.APPLE_TEAM_ID }}
          AID: ${{ secrets.APPLE_ID }}
          APW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          for v in CERT CERT_PW TEAM AID APW; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing release secret: $v. Required: MACOS_CERT_P12_BASE64, MACOS_CERT_PASSWORD, APPLE_TEAM_ID, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD"
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PW" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PW" $KEYCHAIN
          security set-keychain-settings -t 3600 -u $KEYCHAIN
          security import cert.p12 -k $KEYCHAIN -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" $KEYCHAIN
          rm cert.p12

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: XcodeGen version
        run: xcodegen --version

      - name: Generate Xcode project
        working-directory: macos
        run: xcodegen generate

      - name: Build signed app
        working-directory: macos
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild build \
            -project AutoSuggestDesktop.xcodeproj \
            -scheme AutoSuggestDesktop \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Verify signature
        id: locate
        working-directory: macos
        run: |
          APP_PATH=$(find build -name "AutoSuggest.app" -type d | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -d --entitlements - "$APP_PATH"
          # Signing-authority diagnostic: codesign -dvvv writes to stderr, so
          # capture it. A "Developer ID Application: …" Authority line proves the
          # app is signed with the real Developer ID identity; its absence (e.g.
          # "Signature=adhoc") points at an ad-hoc signature, which Apple's
          # notary service rejects as Invalid.
          codesign -dvvv "$APP_PATH" 2>&1 | tee codesign-authority.txt
          if grep -q "Authority=Developer ID Application" codesign-authority.txt; then
            echo "Signed by Developer ID Application."
          else
            echo "::warning::App is NOT signed by 'Developer ID Application' (see codesign -dvvv output above). This is a likely cause of notarization Invalid."
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Deep-sign nested code
        working-directory: macos
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          IDENTITY="Developer ID Application"
          ENTITLEMENTS="AutoSuggestDesktop/AutoSuggest.entitlements"
          # Most-likely cause of notarization Invalid for this app shape: nested
          # code (resource bundles like AutoSuggestApp_AutoSuggestApp.bundle and
          # swift-transformers_Hub.bundle, plus any frameworks/dylibs carrying
          # Mach-O) was left ad-hoc signed or without hardened runtime / secure
          # timestamp. Re-sign every nested Mach-O inside-out (deepest path
          # first) with Developer ID + hardened runtime + timestamp, then
          # re-sign the outer app last so its signature seals the new contents.

          # Collect candidate nested code: frameworks, dylibs, bundles, plus any
          # other Mach-O files under the bundle (executables in helper tools etc).
          declare -a TARGETS=()
          while IFS= read -r p; do
            TARGETS+=("$p")
          done < <(find "$APP_PATH/Contents" \
            \( -name "*.framework" -o -name "*.dylib" -o -name "*.bundle" \) -print)
          # Also pick up loose Mach-O files (no bundle wrapper) not already covered.
          while IFS= read -r f; do
            if file "$f" 2>/dev/null | grep -q "Mach-O"; then
              TARGETS+=("$f")
            fi
          done < <(find "$APP_PATH/Contents" -type f ! -name "*.dylib")

          # Sign deepest paths first so inner code is sealed before its container.
          # Sort by path depth (number of "/") descending; awk '!seen[$0]++'
          # drops duplicates while preserving that depth order (a second sort
          # would scramble it).
          if [ "${#TARGETS[@]}" -gt 0 ]; then
            printf '%s\n' "${TARGETS[@]}" | awk -F/ '{print NF"\t"$0}' | sort -rn -k1,1 | cut -f2- | awk '!seen[$0]++' | while IFS= read -r item; do
              [ -e "$item" ] || continue
              echo "Signing nested: $item"
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "$item"
            done
          fi

          # Re-sign the outer app last, with the project entitlements.
          echo "Re-signing app bundle: $APP_PATH"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$IDENTITY" "$APP_PATH"

          # Confirm the final signature is valid and still Developer ID.
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dvvv "$APP_PATH" 2>&1 | grep "Authority=Developer ID Application" \
            || { echo "::error::App not signed by Developer ID Application after deep-sign"; exit 1; }

      - name: Create DMG
        run: |
          mkdir -p dmg_stage
          cp -R "macos/${{ steps.locate.outputs.app_path }}" dmg_stage/
          # Drag-install target: an /Applications shortcut so opening the DMG
          # shows AutoSuggest.app next to an Applications folder to drag it into.
          ln -s /Applications dmg_stage/Applications
          hdiutil create -volname "AutoSuggest" \
            -srcfolder dmg_stage \
            -ov -format UDZO \
            AutoSuggest.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # `notarytool submit --wait` exits 0 even when the final status is
          # Invalid/Rejected, so the old pipeline sailed past this step and only
          # failed later at "Staple" with a misleading error. Capture the JSON,
          # extract id + status ourselves, and fail loudly on anything that is
          # not "Accepted" — printing the full notary log so the rejection
          # reasons are visible directly in this step's output.
          SUBMIT_JSON=$(xcrun notarytool submit AutoSuggest.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m \
            --output-format json)
          echo "$SUBMIT_JSON"

          SUBMISSION_ID=$(echo "$SUBMIT_JSON" | jq -r '.id // empty')
          STATUS=$(echo "$SUBMIT_JSON" | jq -r '.status // empty')
          echo "Notarization submission id: $SUBMISSION_ID"
          echo "Notarization status: $STATUS"

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$STATUS' (submission $SUBMISSION_ID). Notary log follows:"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi

      - name: Staple DMG
        run: |
          xcrun stapler staple AutoSuggest.dmg
          xcrun stapler validate AutoSuggest.dmg

      - name: Staple app and create ZIP
        working-directory: macos
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          # The app inside the just-notarized DMG shares the notarization ticket
          # (tickets attach to the bundle's code signature), so stapling the
          # standalone app normally succeeds without a second submission.
          if ! xcrun stapler staple "$APP_PATH"; then
            echo "No ticket found for the standalone app; submitting it separately."
            ditto -c -k --keepParent "$APP_PATH" "$GITHUB_WORKSPACE/AutoSuggest-notarize.zip"
            # Same as the DMG step: --wait exits 0 on Invalid, so check status
            # ourselves and surface the notary log before failing.
            ZIP_SUBMIT_JSON=$(xcrun notarytool submit "$GITHUB_WORKSPACE/AutoSuggest-notarize.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 30m \
              --output-format json)
            echo "$ZIP_SUBMIT_JSON"
            ZIP_SUBMISSION_ID=$(echo "$ZIP_SUBMIT_JSON" | jq -r '.id // empty')
            ZIP_STATUS=$(echo "$ZIP_SUBMIT_JSON" | jq -r '.status // empty')
            echo "App notarization submission id: $ZIP_SUBMISSION_ID"
            echo "App notarization status: $ZIP_STATUS"
            if [ "$ZIP_STATUS" != "Accepted" ]; then
              echo "::error::App notarization failed with status '$ZIP_STATUS' (submission $ZIP_SUBMISSION_ID). Notary log follows:"
              if [ -n "$ZIP_SUBMISSION_ID" ]; then
                xcrun notarytool log "$ZIP_SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
              fi
              exit 1
            fi
            xcrun stapler staple "$APP_PATH"
          fi
          xcrun stapler validate "$APP_PATH"
          # ditto preserves resource forks / quarantine metadata better than zip -r.
          ditto -c -k --keepParent "$APP_PATH" "$GITHUB_WORKSPACE/AutoSuggest.zip"

      # Sparkle appcast generation. Gated on the EdDSA private key secret so the
      # release pipeline keeps working before auto-update is activated: when
      # SPARKLE_EDDSA_PRIVATE_KEY is unset this whole step is skipped and the
      # release publishes without an appcast. See docs/SPARKLE_SETUP.md.
      #
      # `generate_appcast` reads the private key from stdin (--ed-key-file -),
      # scans a directory of release archives, and emits a SIGNED appcast.xml
      # (it writes the EdDSA signature + length into each <enclosure>). The
      # appcast.xml is then attached to the GitHub Release as an asset, and the
      # SUFeedURL points at `releases/latest/download/appcast.xml` — GitHub
      # always redirects that to the newest release's asset, so the appcast is
      # served straight from the release with no extra hosting to maintain.
      - name: Generate & sign Sparkle appcast
        if: ${{ env.SPARKLE_EDDSA_PRIVATE_KEY != '' }}
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # Sparkle ships its tools (generate_appcast, generate_keys, sign_update)
          # as a separate "Sparkle binary utilities" artifact. Fetch them.
          SPARKLE_TOOLS_VERSION="2.6.4"
          curl -fsSL -o sparkle-tools.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TOOLS_VERSION}/Sparkle-${SPARKLE_TOOLS_VERSION}.tar.xz"
          mkdir -p sparkle-tools
          tar -xf sparkle-tools.tar.xz -C sparkle-tools
          GENERATE_APPCAST="$(find sparkle-tools -name generate_appcast -type f | head -1)"
          if [ -z "$GENERATE_APPCAST" ]; then
            echo "::error::generate_appcast not found in the Sparkle tools archive"
            exit 1
          fi

          # Stage ONLY the notarized ZIP — Sparkle's update format. Do NOT add the
          # DMG: generate_appcast rejects two archives of the same bundle version
          # ("Duplicate updates are not supported"). The DMG stays a manual
          # drag-install asset on the GitHub Release, not a Sparkle update.
          mkdir -p appcast-stage
          cp "$GITHUB_WORKSPACE/AutoSuggest.zip" appcast-stage/

          # Feed the private key on stdin so it never lands on disk.
          # --download-url-prefix makes each <enclosure url> point at the GitHub
          # Release asset for THIS tag (where AutoSuggest.zip is published),
          # instead of a bare filename — without it Sparkle can't locate the
          # download and the update silently fails.
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" \
            | "$GENERATE_APPCAST" --ed-key-file - \
                --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
                appcast-stage

          if [ ! -f appcast-stage/appcast.xml ]; then
            echo "::error::generate_appcast did not produce appcast.xml"
            exit 1
          fi
          cp appcast-stage/appcast.xml "$GITHUB_WORKSPACE/appcast.xml"
          echo "Generated signed appcast.xml; it is uploaded as a Release asset and served via releases/latest/download/appcast.xml."

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # appcast.xml is only present when the Sparkle step ran (secret set);
          # action-gh-release silently skips missing glob entries.
          files: |
            AutoSuggest.dmg
            AutoSuggest.zip
            appcast.xml
