name: CI
on:
  push:
    branches: [main]
    # Skip the Swift build/test for content-only commits (e.g. the release
    # workflow's appcast publish to website/, docs, markdown). Cloudflare Pages
    # still deploys those — which is why that commit is NOT marked [skip ci]
    # ([skip ci] would also make Pages skip the deploy).
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftFormat
        run: brew install swiftformat
      - name: SwiftFormat version
        run: swiftformat --version
      - name: Lint
        # Paths before the flag: SwiftFormat 0.61+ rejects `--lint <paths>`.
        run: swiftformat Sources Tests --lint
  build-and-test:
    # macos-15: Swift 6.2 (the package's tools version) ships with Xcode 26,
    # which needs macOS 15. macos-14 defaults to Swift 5.10 and fails to build.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode (Swift 6.2+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Toolchain versions
        run: swift --version && xcodebuild -version
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Build
        run: swift build
      - name: Test
        run: swift test
